services:
  app:
    image: aaarbuckle/project-merkle:main
    container_name: merkle-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Compose-internal DB URL — points at the `postgres` service hostname on the internal network.
      # Overrides .env's host-side dev URL when running via docker compose.
      DATABASE_URL: postgresql://merkle:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}@postgres:5432/merkle
      MCP_SESSION_TOKEN_SECRET: ${MCP_SESSION_TOKEN_SECRET:-}
      PORT: ${PORT:-7423}
      HOSTNAME: 0.0.0.0
    ports:
      - "${PORT:-7423}:${PORT:-7423}"
    restart: unless-stopped
    # Watchtower (running separately on the host) will poll DockerHub for this image
    # and auto-restart the container when a new :main tag is pushed.
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: merkle-watchtower
    environment:
      # Only watch containers carrying the watchtower.enable label (the app has it; postgres does not).
      WATCHTOWER_LABEL_ENABLE: "true"
      # Remove old images after a successful update.
      WATCHTOWER_CLEANUP: "true"
      # Poll DockerHub every 300s (5 min) — tunable.
      WATCHTOWER_POLL_INTERVAL: "300"
    volumes:
      # Docker socket — Watchtower needs read-write access to recreate the labeled container on update.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: merkle-postgres
    environment:
      POSTGRES_USER: merkle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}
      POSTGRES_DB: merkle
    # host:container — host is 5433 to avoid collisions with native local Postgres
    ports:
      - "5433:5432"
    volumes:
      - merkle_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merkle -d merkle"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  merkle_pgdata: {}
