services:
  postgres:
    image: postgres:16-alpine
    container_name: merkle-postgres
    environment:
      POSTGRES_USER: merkle
      # Default dev password — override via environment variable in production.
      POSTGRES_PASSWORD: merkle_dev
      POSTGRES_DB: merkle
    # host:container — host is 5433 to avoid collisions with native local Postgres
    ports:
      - "5433:5432"
    volumes:
      - merkle_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merkle -d merkle"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  merkle_pgdata: {}
